<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cloudy</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { width: 100%; height: 100%; overflow: hidden; }

  body {
    background: linear-gradient(180deg, #1a1a2e 0%, #2d3561 40%, #4a5568 100%);
  }

  .cloud-layer {
    position: absolute;
    width: 100%; height: 100%;
    top: 0; left: 0;
  }

  .cloud {
    position: absolute;
    border-radius: 50%;
    filter: blur(0px);
  }

  /* Layer 1 — far, slow, dark */
  .l1 .cloud { background: rgba(80,90,110,0.5); filter: blur(8px); }
  /* Layer 2 — mid */
  .l2 .cloud { background: rgba(120,130,150,0.55); filter: blur(5px); }
  /* Layer 3 — near, fast, light */
  .l3 .cloud { background: rgba(160,170,185,0.6); filter: blur(3px); }

  @keyframes drift1 { 0% { transform: translateX(-30vw); } 100% { transform: translateX(130vw); } }
  @keyframes drift2 { 0% { transform: translateX(-40vw); } 100% { transform: translateX(140vw); } }
  @keyframes drift3 { 0% { transform: translateX(-25vw); } 100% { transform: translateX(125vw); } }

  .ground-mist {
    position: absolute;
    bottom: 0; left: 0; right: 0; height: 30%;
    background: linear-gradient(to top, rgba(100,110,130,0.3), transparent);
    animation: mistPulse 10s ease-in-out infinite alternate;
  }
  @keyframes mistPulse {
    0%   { opacity: 0.5; transform: scaleY(1); }
    100% { opacity: 1;   transform: scaleY(1.1); }
  }
</style>
</head>
<body>
  <div class="cloud-layer l1" id="layer1"></div>
  <div class="cloud-layer l2" id="layer2"></div>
  <div class="cloud-layer l3" id="layer3"></div>
  <div class="ground-mist"></div>

  <script>
    function makeCloud(layer, layerNum) {
      const count = layerNum === 1 ? 5 : layerNum === 2 ? 7 : 6;
      for (let i = 0; i < count; i++) {
        const c = document.createElement('div');
        c.className = 'cloud';
        const w = (120 + Math.random() * 200) / layerNum * 1.5;
        const h = w * (0.4 + Math.random() * 0.3);
        const top = Math.random() * 70;
        const dur = (layerNum === 1 ? 80 : layerNum === 2 ? 55 : 35) + Math.random() * 20;
        const delay = -(Math.random() * dur);
        const anim = layerNum === 1 ? 'drift1' : layerNum === 2 ? 'drift2' : 'drift3';
        c.style.cssText = `
          width:${w}px; height:${h}px;
          top:${top}%; left:0;
          animation:${anim} ${dur}s linear ${delay}s infinite;
          opacity:${0.6 + Math.random()*0.4};
        `;
        // Build a blobby cloud from multiple circles
        const blob = document.createElement('div');
        blob.style.cssText = `position:relative;width:100%;height:100%;`;
        for (let b = 0; b < 5; b++) {
          const bc = document.createElement('div');
          const bw = w * (0.3 + Math.random() * 0.5);
          bc.style.cssText = `
            position:absolute;
            border-radius:50%;
            width:${bw}px; height:${bw * 0.7}px;
            left:${Math.random()*60}%;
            top:${Math.random()*50}%;
            background:inherit;
          `;
          blob.appendChild(bc);
        }
        c.style.background = 'none';
        c.appendChild(blob);
        layer.appendChild(c);

        // Set background on all children
        const bg = layerNum === 1
          ? 'rgba(75,85,105,0.5)'
          : layerNum === 2
            ? 'rgba(120,130,150,0.55)'
            : 'rgba(165,175,190,0.6)';
        c.querySelectorAll('div').forEach(el => el.style.background = bg);
      }
    }

    makeCloud(document.getElementById('layer1'), 1);
    makeCloud(document.getElementById('layer2'), 2);
    makeCloud(document.getElementById('layer3'), 3);
  </script>
</body>
</html>
