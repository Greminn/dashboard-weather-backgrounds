<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sunny</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { width: 100%; height: 100%; overflow: hidden; }

  body {
    background: linear-gradient(180deg, #0a1628 0%, #1a3a6b 30%, #e8832a 70%, #f5c842 100%);
    animation: skyShift 20s ease-in-out infinite alternate;
  }

  @keyframes skyShift {
    0%   { background: linear-gradient(180deg, #0a1628 0%, #1a3a6b 30%, #e8832a 70%, #f5c842 100%); }
    50%  { background: linear-gradient(180deg, #0d2b5e 0%, #1e5fa8 25%, #4a9fd4 60%, #87ceeb 100%); }
    100% { background: linear-gradient(180deg, #0a1628 0%, #1a3a6b 30%, #e8832a 70%, #f5c842 100%); }
  }

  .sun {
    position: absolute;
    width: 120px; height: 120px;
    border-radius: 50%;
    background: radial-gradient(circle, #fff9c4 0%, #ffd700 40%, #ff8c00 100%);
    box-shadow: 0 0 60px 30px rgba(255,200,0,0.4), 0 0 120px 60px rgba(255,140,0,0.2);
    top: 20%; left: 50%;
    transform: translateX(-50%);
    animation: sunPulse 4s ease-in-out infinite, sunArc 20s ease-in-out infinite alternate;
  }

  @keyframes sunPulse {
    0%, 100% { box-shadow: 0 0 60px 30px rgba(255,200,0,0.4), 0 0 120px 60px rgba(255,140,0,0.2); }
    50%       { box-shadow: 0 0 80px 40px rgba(255,200,0,0.6), 0 0 160px 80px rgba(255,140,0,0.3); }
  }

  @keyframes sunArc {
    0%   { top: 60%; left: 10%; }
    50%  { top: 12%; left: 50%; }
    100% { top: 60%; left: 90%; }
  }

  .ray {
    position: absolute;
    top: 50%; left: 50%;
    width: 4px;
    background: linear-gradient(to top, rgba(255,220,100,0.8), transparent);
    transform-origin: bottom center;
    border-radius: 2px;
    animation: rayPulse 3s ease-in-out infinite;
  }

  @keyframes rayPulse {
    0%, 100% { opacity: 0.6; height: 80px; }
    50%       { opacity: 1;   height: 110px; }
  }

  .haze {
    position: absolute;
    bottom: 0; left: 0; right: 0;
    height: 200px;
    background: linear-gradient(to top, rgba(255,180,80,0.15), transparent);
    animation: hazePulse 6s ease-in-out infinite alternate;
  }

  @keyframes hazePulse {
    0%   { opacity: 0.4; }
    100% { opacity: 1; }
  }

  .shimmer {
    position: absolute;
    bottom: 0; left: 0; right: 0; height: 80px;
    background: repeating-linear-gradient(90deg,
      transparent 0px, transparent 40px,
      rgba(255,220,100,0.05) 40px, rgba(255,220,100,0.05) 80px
    );
    animation: shimmerMove 8s linear infinite;
  }

  @keyframes shimmerMove {
    0%   { background-position: 0 0; }
    100% { background-position: 80px 0; }
  }
</style>
</head>
<body>
  <div class="sun">
    <!-- Rays generated by JS below -->
  </div>
  <div class="haze"></div>
  <div class="shimmer"></div>

  <script>
    const sun = document.querySelector('.sun');
    for (let i = 0; i < 12; i++) {
      const ray = document.createElement('div');
      ray.className = 'ray';
      const angle = (i / 12) * 360;
      const len = 70 + Math.random() * 40;
      ray.style.cssText = `
        position:absolute; top:50%; left:50%;
        width:3px; height:${len}px;
        background:linear-gradient(to top, rgba(255,220,100,0.7), transparent);
        transform-origin:bottom center;
        transform:translateX(-50%) translateY(-100%) rotate(${angle}deg);
        border-radius:2px;
        animation:rayPulse ${2.5 + Math.random()*2}s ease-in-out infinite;
        animation-delay:${Math.random()*2}s;
      `;
      sun.appendChild(ray);
    }
  </script>
</body>
</html>
