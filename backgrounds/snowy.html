<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Snowy</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { width: 100%; height: 100%; overflow: hidden; }

  body {
    background: linear-gradient(180deg, #0a0f1e 0%, #1a2540 50%, #2c3f5c 100%);
  }

  canvas { position: absolute; top: 0; left: 0; width: 100%; height: 100%; }

  .ground {
    position: absolute;
    bottom: 0; left: 0; right: 0;
    height: 18%;
    background: linear-gradient(to top, rgba(220,235,255,0.18) 0%, rgba(180,210,255,0.05) 60%, transparent 100%);
    border-radius: 60% 60% 0 0 / 30% 30% 0 0;
  }

  .aurora {
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 40%;
    background: linear-gradient(180deg,
      rgba(0,200,160,0.04) 0%,
      rgba(60,130,255,0.06) 50%,
      transparent 100%
    );
    animation: auroraPulse 12s ease-in-out infinite alternate;
    filter: blur(30px);
  }

  @keyframes auroraPulse {
    0%   { opacity: 0.3; transform: scaleX(1);   }
    50%  { opacity: 0.7; transform: scaleX(1.05); }
    100% { opacity: 0.4; transform: scaleX(0.98); }
  }
</style>
</head>
<body>
  <div class="aurora"></div>
  <canvas id="snow"></canvas>
  <div class="ground"></div>

  <script>
    const canvas = document.getElementById('snow');
    const ctx = canvas.getContext('2d');

    function resize() {
      canvas.width = window.innerWidth;
      canvas.height = window.innerHeight;
    }
    resize();
    window.addEventListener('resize', resize);

    const flakes = [];
    const COUNT = 180;

    for (let i = 0; i < COUNT; i++) {
      flakes.push({
        x: Math.random() * window.innerWidth,
        y: Math.random() * window.innerHeight,
        r: 1 + Math.random() * 4,
        speed: 0.5 + Math.random() * 1.5,
        drift: (Math.random() - 0.5) * 0.4,
        opacity: 0.3 + Math.random() * 0.7,
        wobble: Math.random() * Math.PI * 2,
        wobbleSpeed: 0.01 + Math.random() * 0.02
      });
    }

    function draw() {
      ctx.clearRect(0, 0, canvas.width, canvas.height);

      flakes.forEach(f => {
        ctx.save();
        ctx.beginPath();
        ctx.arc(f.x, f.y, f.r, 0, Math.PI * 2);
        ctx.fillStyle = `rgba(220,235,255,${f.opacity})`;
        ctx.shadowColor = 'rgba(180,210,255,0.5)';
        ctx.shadowBlur = f.r * 2;
        ctx.fill();
        ctx.restore();

        f.wobble += f.wobbleSpeed;
        f.x += f.drift + Math.sin(f.wobble) * 0.3;
        f.y += f.speed;

        if (f.y > canvas.height + 10) {
          f.y = -10;
          f.x = Math.random() * canvas.width;
        }
        if (f.x > canvas.width + 10) f.x = -10;
        if (f.x < -10) f.x = canvas.width + 10;
      });

      requestAnimationFrame(draw);
    }

    draw();
  </script>
</body>
</html>
