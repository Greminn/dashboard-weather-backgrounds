<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Rainy</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { width: 100%; height: 100%; overflow: hidden; }

  body {
    background: linear-gradient(180deg, #0d1117 0%, #1c2940 40%, #2a3f5f 100%);
  }

  canvas {
    position: absolute;
    top: 0; left: 0;
    width: 100%; height: 100%;
  }

  .mist {
    position: absolute;
    bottom: 0; left: 0; right: 0;
    height: 35%;
    background: linear-gradient(to top, rgba(50,80,120,0.35), transparent);
    animation: mistPulse 8s ease-in-out infinite alternate;
  }

  @keyframes mistPulse {
    0%   { opacity: 0.6; height: 30%; }
    100% { opacity: 1;   height: 40%; }
  }

  .puddle {
    position: absolute;
    bottom: 2%;
    border-radius: 50%;
    background: rgba(100,150,200,0.12);
    animation: puddleRipple 3s ease-out infinite;
  }

  @keyframes puddleRipple {
    0%   { transform: scale(0.8); opacity: 0.8; }
    100% { transform: scale(1.4); opacity: 0; }
  }
</style>
</head>
<body>
  <canvas id="rain"></canvas>
  <div class="mist"></div>

  <script>
    const canvas = document.getElementById('rain');
    const ctx = canvas.getContext('2d');

    function resize() {
      canvas.width = window.innerWidth;
      canvas.height = window.innerHeight;
    }
    resize();
    window.addEventListener('resize', resize);

    const drops = [];
    const COUNT = 220;
    const WIND = 0.3; // slight angle

    for (let i = 0; i < COUNT; i++) {
      drops.push({
        x: Math.random() * window.innerWidth,
        y: Math.random() * window.innerHeight,
        len: 12 + Math.random() * 24,
        speed: 8 + Math.random() * 10,
        opacity: 0.2 + Math.random() * 0.5,
        width: 0.5 + Math.random() * 1
      });
    }

    function draw() {
      ctx.clearRect(0, 0, canvas.width, canvas.height);

      drops.forEach(d => {
        ctx.save();
        ctx.strokeStyle = `rgba(180,210,255,${d.opacity})`;
        ctx.lineWidth = d.width;
        ctx.beginPath();
        ctx.moveTo(d.x, d.y);
        ctx.lineTo(d.x + d.len * WIND, d.y + d.len);
        ctx.stroke();
        ctx.restore();

        d.y += d.speed;
        d.x += d.speed * WIND;

        if (d.y > canvas.height + 30 || d.x > canvas.width + 30) {
          d.x = Math.random() * canvas.width - canvas.width * 0.1;
          d.y = -30;
        }
      });

      requestAnimationFrame(draw);
    }

    draw();

    // Puddles
    const puddles = [
      { left: '15%', size: 80 },
      { left: '42%', size: 120 },
      { left: '70%', size: 60 },
      { left: '85%', size: 90 },
    ];

    puddles.forEach((p, i) => {
      const el = document.createElement('div');
      el.className = 'puddle';
      el.style.cssText = `
        left: ${p.left};
        width: ${p.size}px;
        height: ${p.size * 0.3}px;
        animation-duration: ${2.5 + i * 0.7}s;
        animation-delay: ${i * 0.5}s;
      `;
      document.body.appendChild(el);
    });
  </script>
</body>
</html>
